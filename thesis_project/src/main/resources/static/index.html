<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <title>仿 Google 地图 Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/map.css?v=2025-08-09-04"/>
    <link rel="stylesheet" href="/css/auth.css?v=2025-08-09-09"/>
</head>
<body>
<!-- 左侧 80px 侧边栏 -->
<div id="sidebar">
    <div class="sidebar-header">我的</div>
    <ul class="sidebar-menu">
        <li id="menu-saved">已保存</li>
        <li id="menu-recent">最近</li>
    </ul>
</div>

<!-- 地图 -->
<div id="map"></div>

<!-- 顶部搜索框 -->
<!--<div id="search-container">-->

<!--</div>-->

<!-- 顶部右侧：账号/用户 -->
<div id="account-bar" style="position:fixed;top:16px;right:16px;z-index:1001;display:flex;gap:8px;align-items:center;">
    <!-- 未登录：显示 登录/注册 按钮 -->
    <button id="btnOpenAuth" class="account-btn logged-out">登录 / 注册</button>

    <!-- 已登录：显示头像 + 下拉菜单 -->
    <div id="userMenu" class="user-menu logged-in" style="display:none;position:relative;">
        <div class="user-chip" id="userChip" title="账户">
            <span id="userInitial">U</span>
        </div>
        <div class="user-dropdown" id="userDropdown" style="display:none;">
            <div class="user-info" style="padding:8px 16px;">
                <div id="userName" style="font-weight:600;">未命名</div>
                <div id="userEmail" class="muted" style="font-size:12px;color:#5f6368;"></div>
            </div>
            <hr/>
            <button class="menu-item" id="gotoSaved">已保存</button>
            <button class="menu-item" id="gotoRecent">最近</button>
            <hr/>
            <button class="menu-item danger" id="btnLogout">退出登录</button>
        </div>
    </div>
</div>

<!-- 左侧“路线面板” -->
<div id="directions">
    <div class="modes">
        <button data-mode="car" class="mode active">🚗</button>
        <button data-mode="transit" class="mode">🚌</button>
        <button data-mode="walk" class="mode">🚶</button>
    </div>

    <div class="inputs">
        <div class="field">
            <input id="origin" placeholder="选择起点"/>
            <button class="suggest-btn" data-target="origin">🔍</button>
            <div class="suggest-list" id="origin-suggest"></div>
        </div>
        <div class="field">
            <input id="destination" placeholder="选择目的地"/>
            <button class="suggest-btn" data-target="destination">🔍</button>
            <div class="suggest-list" id="dest-suggest"></div>
        </div>
        <div class="field">
            <input id="city" placeholder="城市（可选，例如：北京）"/>
        </div>
        <button id="btnGo" class="primary">立即出发</button>
    </div>

    <div id="summary" class="summary" hidden>
        <div class="title">路线</div>
        <div class="cards">
            <div class="card" id="carCard" hidden>🚗 <b id="carTime"></b> · <span id="carDist"></span></div>
            <div class="card" id="transitCard" hidden>🚌 <b id="transitTime"></b> · <span id="transitDist"></span></div>
            <div class="card" id="walkCard" hidden>🚶 <b id="walkTime"></b> · <span id="walkDist"></span></div>
        </div>
    </div>

    <div id="steps" class="steps" hidden></div>
</div>

<!-- 认证弹窗（登录 / 注册） -->
<div id="authModal" class="auth-modal" style="display:none;">
    <div class="auth-backdrop" id="authBackdrop"></div>
    <div class="auth-card">
        <div class="auth-header">
            <div class="tabs">
                <button class="tab active" data-tab="login">登录</button>
                <button class="tab" data-tab="register">注册</button>
            </div>
            <button class="close" id="authClose">✕</button>
        </div>

        <div class="auth-body">
            <!-- 登录 -->
            <form id="loginForm" class="tab-panel" data-panel="login">
                <label>账号（用户名 / 邮箱 / 手机号）</label>
                <input id="loginId" type="text" autocomplete="username" required/>
                <label>密码</label>
                <input id="loginPassword" type="password" autocomplete="current-password" required/>
                <div class="row space-between">
                    <label class="checkbox"><input id="rememberMe" type="checkbox"/> 记住我</label>
                    <a class="link muted" id="forgotPwd" href="javascript:void(0)">忘记密码？</a>
                </div>
                <button type="submit" class="primary full">登录</button>
            </form>

            <!-- 注册 -->
            <form id="registerForm" class="tab-panel" data-panel="register" style="display:none;">
                <label>邮箱（与手机号至少填一个）</label>
                <input id="regEmail" type="email" autocomplete="email" placeholder="可留空"/>
                <label>手机号</label>
                <input id="regPhone" type="tel" autocomplete="tel" placeholder="可留空"/>
                <label>密码</label>
                <input id="regPassword" type="password" autocomplete="new-password" required/>
                <label>用户名（可选）</label>
                <input id="regUsername" type="text" placeholder="不填则以后再设置"/>
                <button type="submit" class="primary full">注册</button>
            </form>
        </div>

        <div class="auth-footer muted">
            登录后可使用：已保存列表、路线历史、私人设置等。
        </div>
    </div>
</div>

<!-- ======= 已保存列表 抽屉 + 弹窗 ======= -->
<!-- 抽屉 -->
<div id="savedPanel" class="drawer" style="display:none;">
    <div class="drawer-header">
        <button id="savedBack" class="icon-btn" title="关闭">✕</button>
        <div class="title">已保存</div>
        <button id="btnNewList" class="primary small">新建列表</button>
    </div>

    <!-- 列表列表视图 -->
    <div id="savedListsView">
        <div id="listsContainer" class="list-group"></div>
    </div>

    <!-- 列表详情（地点项） -->
    <div id="savedItemsView" style="display:none;">
        <div class="subheader">
            <button id="btnBackToLists" class="link">← 返回列表</button>
            <div class="grow"></div>
            <button id="btnAddPlace" class="primary small">向此列表添加地点</button>
        </div>
        <div class="list-meta">
            <input id="editListName" class="inline-input" placeholder="列表名称"/>
            <textarea id="editListNote" class="inline-textarea" placeholder="备注（可选）"></textarea>
            <div class="row right">
                <button id="btnSaveListMeta" class="primary small">保存</button>
                <button id="btnDeleteList" class="danger small">删除列表</button>
            </div>
        </div>
        <div id="itemsContainer" class="list-group"></div>
    </div>
</div>

<!-- 新建列表 Modal -->
<div id="newListModal" class="modal" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <div>新建列表</div>
            <button class="icon-btn" id="closeNewList">✕</button>
        </div>
        <div class="modal-body">
            <label>名称</label>
            <input id="newListName"/>
            <label>备注（可选）</label>
            <textarea id="newListNote"></textarea>
        </div>
        <div class="modal-footer">
            <button id="createList" class="primary">创建</button>
        </div>
    </div>
</div>

<!-- 添加地点 Modal（地址 -> 候选 -> 备注） -->
<div id="addPlaceModal" class="modal" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <div>添加地点到列表</div>
            <button class="icon-btn" id="closeAddPlace">✕</button>
        </div>
        <div class="modal-body">
            <label>地址</label>
            <div class="row">
                <input id="addPlaceAddress" class="grow"/>
                <button id="btnFetchCandidates" class="secondary">搜索候选</button>
            </div>
            <label>候选结果</label>
            <select id="addPlaceCandidates"></select>
            <label>备注（可选）</label>
            <textarea id="addPlaceNote"></textarea>
        </div>
        <div class="modal-footer">
            <button id="confirmAddPlace" class="primary">添加</button>
        </div>
    </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js" crossorigin=""></script>
<!-- 业务脚本 -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/axios-setup.js"></script>
<script src="/js/app.js?v=2025-08-09-13"></script>
<script src="/js/auth.js?v=2025-08-09-09"></script>
<script src="/js/lists.js?v=2025-08-09-011"></script>
</body>
</html>
